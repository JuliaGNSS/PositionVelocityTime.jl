name: Test
on:
  push:
    branches:
      - 'master'
    tags: ['*']
  pull_request:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        version:
          - '1.10'
          - '1'
          #- 'nightly'
        os:
          - ubuntu-latest
        include:
          # windows-latest is unsupported since GNSSDecoder 2: it depends on
          # Aff3ct, whose aff3ct_jll ships no Windows binaries. Restore this
          # entry once Aff3ct gains Windows support.
          #- os: windows-latest
          #  version: '1'
          - os: macOS-latest
            version: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          plugins: noop
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration:
    name: Integration (real-data PVT fix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - name: Cache Flexiband L125 capture prefix
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/flexiband-l125
          key: flexiband-l125-roof-210s-l1-prefix-v1
      - uses: julia-actions/julia-runtest@v1
        env:
          PVT_RUN_INTEGRATION_TEST: 'true'
          PVT_TESTDATA_DIR: ${{ runner.temp }}/flexiband-l125
